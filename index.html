<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>RESPON IPDN</title>

  <link rel="icon" href="https://drive.google.com/uc?export=view&id=1JGe42tKH-vLnrAgviP6ZwBIsMSqh8iqF" />

  <style>

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#eeeeee;
      font-family:Arial,sans-serif;
    }

    .iframe-container{
      width:100%;
      height:100dvh;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:white;
    }

  </style>
</head>

<body>

<div class="iframe-container">

  <iframe
    id="app"
    scrolling="yes"
    allowfullscreen
    allow="fullscreen; camera; microphone; geolocation">
  </iframe>

</div>

<script>

const iframe = document.getElementById("app");

function loadPage(){

  // HALAMAN FORMULIR
  if(location.hash === "#formulir"){

    iframe.src =
    "https://script.google.com/a/ipdn.ac.id/macros/s/AKfycbyLvQmxFyYL6CDf7g21o7P3nD4zRbAogYBO6QOsPQiVsyb1y0Bd4TjjN5PspPXBUHp6Aw/exec?page=masyarakat";

  }

  // HALAMAN UTAMA
  else{

    iframe.src =
    "https://script.google.com/a/ipdn.ac.id/macros/s/AKfycbyLvQmxFyYL6CDf7g21o7P3nD4zRbAogYBO6QOsPQiVsyb1y0Bd4TjjN5PspPXBUHp6Aw/exec";

  }

}

window.addEventListener("load", loadPage);
window.addEventListener("hashchange", loadPage);

</script>

</body>
</html>
