<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>RESPON IPDN</title>

  <link rel="icon"
        href="https://drive.google.com/file/d/1PHpqMN1RcxNyGh6yKz7WLBLsp3LOKhdw/view?usp=sharing" />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#f1f5f9;
      font-family:Arial,sans-serif;
    }

    .iframe-container{
      width:100%;
      height:100dvh;
      overflow:hidden;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:white;
    }

    .loading{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:white;
      z-index:9999;
      transition:0.3s;
    }

    .loading.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .spinner{
      width:48px;
      height:48px;
      border:5px solid #dbeafe;
      border-top:5px solid #2563eb;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

  </style>

</head>

<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<!-- IFRAME -->
<div class="iframe-container">

  <iframe
    id="app"
    scrolling="yes"
    allowfullscreen
    allow="fullscreen; camera; microphone; geolocation">
  </iframe>

</div>

<script>

const iframe =
document.getElementById("app");

const loading =
document.getElementById("loading");

/* =====================================================
   URL GOOGLE APPS SCRIPT
===================================================== */

const GAS_URL =
"https://script.google.com/a/ipdn.ac.id/macros/s/AKfycbyLvQmxFyYL6CDf7g21o7P3nD4zRbAogYBO6QOsPQiVsyb1y0Bd4TjjN5PspPXBUHp6Aw/exec";

/* =====================================================
   HELPER PARAMETER

   Contoh:
   GitHub:
   https://humasipdn.github.io/RESPON-IPDN/?token=xxx&nama=Admin#admin

   Dikirim ke Apps Script:
   GAS_URL?page=admin&token=xxx&nama=Admin
===================================================== */

function getExtraParams(){

  const search =
  window.location.search || "";

  if(!search){
    return "";
  }

  return search.replace("?", "&");

}

function setIframePage(page){

  loading.classList.remove("hide");

  const extraParams =
  getExtraParams();

  iframe.src =
  GAS_URL + "?page=" + encodeURIComponent(page) + extraParams;

}

function setIframeHome(){

  loading.classList.remove("hide");

  iframe.src =
  GAS_URL + getExtraParams().replace("&", "?");

}

/* =====================================================
   ROUTER
===================================================== */

function loadPage(){

  const hash =
  window.location.hash || "";

  /* =========================================
     PORTAL UTAMA
  ========================================= */

  if(
    hash === "" ||
    hash === "#" ||
    hash === "#portal" ||
    hash === "#beranda"
  ){

    loading.classList.remove("hide");

    iframe.src =
    GAS_URL;

    return;

  }

  /* =========================================
     PENGADUAN & PERMINTAAN INFORMASI
  ========================================= */

  if(hash === "#formulir"){

    setIframePage("masyarakat");
    return;

  }

  /* =========================================
     CEK STATUS NOMOR LAYANAN
  ========================================= */

  if(hash === "#cek"){

    setIframePage("cek");
    return;

  }

  /* =========================================
     LOGIN INTERNAL
  ========================================= */

  if(hash === "#login_internal"){

    setIframePage("login_internal");
    return;

  }

  /* =========================================
     ADMIN
  ========================================= */

  if(hash === "#admin"){

    setIframePage("admin");
    return;

  }

  /* =========================================
     BAGIAN / UNIT KERJA
  ========================================= */

  if(hash === "#bagian"){

    setIframePage("bagian");
    return;

  }

  /* =========================================
     VERIFIKATOR / PIMPINAN
  ========================================= */

  if(hash === "#pimpinan"){

    setIframePage("pimpinan");
    return;

  }

  /* =========================================
     MONITORING PIMPINAN
  ========================================= */

  if(hash === "#monitoring_pimpinan"){

    setIframePage("monitoring_pimpinan");
    return;

  }

  /* =========================================
     LAPORAN ADMIN
  ========================================= */

  if(hash === "#laporan"){

    setIframePage("laporan");
    return;

  }

  /* =========================================
     KELOLA USER
  ========================================= */

  if(hash === "#users"){

    setIframePage("users");
    return;

  }

  /* =========================================
     JIKA HASH TIDAK DIKENALI
     KEMBALI KE PORTAL UTAMA
  ========================================= */

  loading.classList.remove("hide");

  iframe.src =
  GAS_URL;

}

/* =====================================================
   EVENT
===================================================== */

window.addEventListener(
  "load",
  loadPage
);

window.addEventListener(
  "hashchange",
  loadPage
);

/* =====================================================
   IFRAME LOADED
===================================================== */

iframe.onload = function(){

  loading.classList.add("hide");

};

</script>

</body>
</html>
